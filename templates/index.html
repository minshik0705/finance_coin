<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinView</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>
    <div id="app">

        <!-- 헤더 -->
        <header>
            <h1>CoinView</h1>
            <span id="current-price">-</span>
            <span id="price-change" class="neutral">-</span>
        </header>

        <!-- 심볼 선택 탭 -->
        <div id="symbol-tabs">
            {% for symbol in symbols %}
            <button
                class="symbol-btn {% if loop.first %}active{% endif %}"
                data-symbol="{{ symbol }}">
                {{ symbol | replace("USDT", "") }}
            </button>
            {% endfor %}
        </div>

        <!-- 차트 -->
        <div id="chart-container">
            <div id="chart"></div>
        </div>

        <!-- 이상탐지 알림 -->
        <div id="anomaly-panel">
            <h3>🔍 이상탐지 알림</h3>
            <div id="anomaly-list">
                <p class="no-data">탐지된 이상 없음</p>
            </div>
        </div>

    </div>

    <script src="/static/chart.js"></script>

</body>
</html>
